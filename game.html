<!DOCTYPE html>
<html>
<head>
<title>Catch My Heart 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #ffafbd, #ffc3a0);
  font-family: Arial;
  text-align: center;
}

h1 {
  color: white;
  margin-top: 15px;
}

#score, #level {
  color: white;
  font-size: 18px;
}

button {
  margin: 8px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #ff4d6d;
  color: white;
}

.heart {
  position: absolute;
  font-size: 30px;
  cursor: pointer;
  transition: transform 0.2s;
  animation: float 2s linear;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(-20px); }
}

/* 💥 explosion particles */
.particle {
  position: absolute;
  font-size: 18px;
  animation: explode 0.6s ease-out forwards;
}

@keyframes explode {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(2) translateY(-50px); opacity: 0; }
}

/* 🎬 win screen */
#win {
  display: none;
  color: white;
  margin-top: 20px;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<h1>💖 Catch My Heart 💖</h1>

<div id="score">Score: 0</div>
<div id="level">Level: 1</div>

<button onclick="startGame()">🎮 Start Game</button>
<button onclick="window.location.href='index.html'">⬅ Back</button>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="music2.mp3" type="audio/mpeg">
</audio>

<!-- 🔊 SOUND -->
<audio id="popSound">
  <source src="https://www.soundjay.com/button/sounds/button-16.mp3">
</audio>

<div id="win">
  <h2>🎉 You caught all my hearts! 💖</h2>
</div>

<script>

let score = 0;
let level = 1;
let speed = 1200;
let gameStarted = false;

// 🎵 start music when game starts
function startMusic(){
  let music = document.getElementById("music");
  music.volume = 0.5;
  music.play();
}

// 🎮 start game
function startGame(){
  if(gameStarted) return;
  gameStarted = true;

  startMusic();
  spawnLoop();
}

// 💖 spawn moving hearts
function spawnHeart(){

  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";

  let startX = Math.random() * window.innerWidth;
  let startY = window.innerHeight;

  h.style.left = startX + "px";
  h.style.top = startY + "px";

  document.body.appendChild(h);

  // smooth movement upward
  let move = setInterval(() => {
    startY -= 2;
    h.style.top = startY + "px";
  }, 10);

  // click event
  h.onclick = function(){

    // 🔊 sound
    document.getElementById("popSound").play();

    // 💥 explosion
    for(let i=0;i<6;i++){
      let p = document.createElement("div");
      p.className = "particle";
      p.innerHTML = "💖";
      p.style.left = startX + "px";
      p.style.top = startY + "px";
      document.body.appendChild(p);

      setTimeout(() => p.remove(), 600);
    }

    score++;
    document.getElementById("score").innerText = "Score: " + score;

    h.remove();
    clearInterval(move);

    // 🎯 level up system
    if(score % 5 === 0){
      level++;
      speed -= 150;
      document.getElementById("level").innerText = "Level: " + level;
    }

    // 🎉 win
    if(score === 25){
      document.getElementById("win").style.display = "block";
document.getElementById("music").pause();
    }
  };

  setTimeout(() => {
    h.remove();
    clearInterval(move);
  }, 3000);
}

// loop with difficulty
function spawnLoop(){
  setInterval(() => {
    if(gameStarted){
      spawnHeart();
    }
  }, speed);
}

</script>

</body>
</html>
